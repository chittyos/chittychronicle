# Cloudflare Workers configuration for ChittyChronicle
# Full-stack Express+Vite app backed by Neon PostgreSQL
# Edge worker handles routing at chronicle.chitty.cc

name = "chittychronicle"
main = "worker/index.ts"
compatibility_date = "2024-11-01"

[placement]
mode = "smart"

# Production configuration
[env.production]
name = "chittychronicle"
routes = [
  { pattern = "chronicle.chitty.cc/*", zone_name = "chitty.cc" }
]

[env.production.vars]
ENVIRONMENT = "production"

# Secrets (set via `wrangler secret put`):
#   NEON_DATABASE_URL        - Neon PostgreSQL connection string
#   CHITTYCONNECT_SERVICE_TOKEN - ChittyConnect service auth

# ChittyTrack observability
[[env.production.tail_consumers]]
service = "chittytrack"

# Preview/staging environment
[env.preview]
name = "chittychronicle-preview"
routes = [
  { pattern = "preview.chronicle.chitty.cc/*", zone_name = "chitty.cc" }
]

[env.preview.vars]
ENVIRONMENT = "staging"

[[env.preview.tail_consumers]]
service = "chittytrack"

# Development environment
[env.development]
name = "chittychronicle-dev"
vars = { ENVIRONMENT = "development" }

# No custom build needed — wrangler bundles the worker entry directly
# Full app build (vite + esbuild) is for container/VM deployments via `npm run build`
